<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <title>Frontend Mentor | QR code component</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="font-family: 'Outfit', sans-serif; margin: 0; background-color: hsl(212, 45%, 89%);">
  <main class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card rounded-3 p-3" style="width: 16rem;">
      <img class="img-fluid rounded-3 mb-2" src="images/image-qr-code.png" alt="QRC">


      <h6 class="card-title m-2 fw-bold text-center">Improve your front-end skills by building projects</h6>

      <p class="card-text small text-center">
        Scan the QR code to visit Frontend Mentor and take your coding skills to the next
        level</p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
